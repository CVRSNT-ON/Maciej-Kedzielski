<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<meta name="author" content="Maciej Kędzielski">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Maciej Kędzielski">
<meta name="description" id="metaDesc" content="Original painting by Maciej Kędzielski">
<meta property="og:image" id="ogImage" content="">
<meta property="og:title" id="ogTitle" content="Maciej Kędzielski — Painter">
<title>Loading... — Maciej Kędzielski</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F9F6F1;--dark:#111110;--dark-2:#2C4235;--text:#1A1917;--text-l:#6B6560;--accent:#C85C3A;--accent-l:#E8A88E;--border:#E0D9CE;--display:'Syne',sans-serif;--body:'Inter',-apple-system,sans-serif;--max-w:1400px;--g:clamp(1.25rem,4vw,3rem)}
html{scroll-behavior:smooth;scroll-padding-top:70px}
body{font-family:var(--body);background:var(--dark);color:var(--bg);line-height:1.6;font-weight:300;-webkit-font-smoothing:antialiased}
img{-webkit-user-select:none;user-select:none}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem var(--g);display:flex;justify-content:space-between;align-items:center;background:rgba(17,17,16,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(249,246,241,.06)}
.nav-logo{font-family:var(--display);font-size:1rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--bg);text-decoration:none;transition:color .3s}
.nav-logo:hover{color:var(--accent)}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{font-size:.72rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(249,246,241,.45);text-decoration:none;transition:color .3s}
.nav-links a:hover{color:var(--accent)}
.nav-back{font-size:.72rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(249,246,241,.4);text-decoration:none;display:flex;align-items:center;gap:.45rem;transition:color .3s}
.nav-back:hover{color:var(--accent)}
.hamburger{display:none;background:none;border:none;cursor:pointer;width:28px;height:20px;position:relative;z-index:110}
.hamburger span{display:block;width:100%;height:2px;background:var(--bg);position:absolute;left:0;transition:all .3s}
.hamburger span:nth-child(1){top:0}.hamburger span:nth-child(2){top:50%;transform:translateY(-50%)}.hamburger span:nth-child(3){bottom:0}
.hamburger.active span:nth-child(1){top:50%;transform:translateY(-50%) rotate(45deg)}.hamburger.active span:nth-child(2){opacity:0}.hamburger.active span:nth-child(3){bottom:50%;transform:translateY(50%) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;inset:0;z-index:105;background:var(--dark);flex-direction:column;justify-content:center;align-items:center;gap:2.5rem}
.mobile-menu.open{display:flex}
.mobile-menu a{font-family:var(--display);font-size:2rem;font-weight:700;text-transform:uppercase;color:var(--bg);text-decoration:none}
.mobile-close{position:absolute;top:1.25rem;right:var(--g);background:none;border:none;font-size:2rem;color:var(--bg);cursor:pointer;z-index:111}
.artwork-detail{max-width:var(--max-w);margin:0 auto;padding:clamp(5rem,10vw,7rem) var(--g) clamp(4rem,8vw,6rem)}
.artwork-layout{display:grid;grid-template-columns:1.2fr 1fr;gap:clamp(2rem,4vw,4rem);align-items:start;opacity:0;transition:opacity .4s ease}
.artwork-layout.loaded{opacity:1}
.artwork-main-img{width:100%;display:block;pointer-events:none}
.loading-msg{text-align:center;padding:8rem 2rem;color:rgba(249,246,241,.4);font-size:1rem}
.back-link{font-family:var(--display);font-size:.65rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(249,246,241,.35);text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;margin-bottom:2rem;transition:color .3s}
.back-link:hover{color:var(--accent)}
.section-label{font-size:.62rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem}
.artwork-title{font-family:var(--display);font-size:clamp(2rem,5vw,3.5rem);font-weight:800;text-transform:uppercase;letter-spacing:-.01em;line-height:.95;margin-bottom:.5rem}
.artwork-year{font-size:.78rem;color:rgba(249,246,241,.35);margin-bottom:2rem}
.artwork-meta{font-size:.85rem;color:rgba(249,246,241,.5);margin-bottom:.35rem}
.artwork-price{font-family:var(--display);font-size:2.2rem;font-weight:800;color:var(--accent);margin:1.25rem 0}
.artwork-badge{display:inline-block;font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.25rem .7rem;margin-bottom:1rem}
.badge-available{background:#2B6B3B;color:#fff}
.badge-inquire{background:#8B6914;color:#fff}
.badge-sold{background:#9B2C2C;color:#fff}
.artwork-desc{font-size:.9rem;color:rgba(249,246,241,.55);line-height:1.8;margin-bottom:2rem}
.artwork-actions{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:2rem}
.btn{display:inline-block;text-align:center;font-family:var(--display);font-size:.7rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:.85rem 2rem;cursor:pointer;text-decoration:none;transition:all .3s;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#a84a2e}
.btn-outline{border:1.5px solid rgba(249,246,241,.2);background:none;color:rgba(249,246,241,.7)}
.btn-outline:hover{border-color:var(--bg);color:var(--bg)}
.wear-cta{margin-top:2rem;padding:1.25rem;border:1px solid rgba(249,246,241,.08);background:rgba(249,246,241,.03)}
.wear-cta p{font-size:.78rem;color:rgba(249,246,241,.4);margin-bottom:.75rem;line-height:1.6}
.wear-cta a{font-family:var(--display);font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--accent-l);text-decoration:none;transition:color .3s}
.wear-cta a:hover{color:var(--accent)}
.room-section{margin-top:2.5rem}
.room-scene{position:relative;width:100%;aspect-ratio:16/10;border-radius:4px;overflow:hidden;background:#1a1a18}
.room-scene img.room-bg{width:100%;height:100%;object-fit:cover;display:block}
.room-painting{position:absolute;transition:all .3s ease;transform:translate(-50%,-50%)}
.room-painting-inner{position:relative;width:100%;height:100%;border:3px solid #1a1a1a;box-shadow:0 12px 40px rgba(0,0,0,.5),0 4px 12px rgba(0,0,0,.35)}
.room-painting-inner img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.room-selector{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap}
.room-thumb{width:60px;height:38px;object-fit:cover;border:2px solid transparent;cursor:pointer;opacity:.5;transition:all .3s;border-radius:2px;pointer-events:auto}
.room-thumb:hover{opacity:.85}
.room-thumb.active{border-color:var(--accent);opacity:1}
.room-caption{text-align:center;margin-top:.75rem;font-size:.72rem;color:rgba(249,246,241,.3);font-style:italic}
.nav-row{display:flex;gap:.75rem;margin-top:2rem;justify-content:center}
.footer{border-top:1px solid rgba(249,246,241,.06);padding:2rem var(--g);display:flex;justify-content:space-between;align-items:center;max-width:var(--max-w);margin:0 auto;font-size:.72rem;color:rgba(249,246,241,.3);flex-wrap:wrap;gap:.75rem}
.footer a{color:rgba(249,246,241,.3);text-decoration:none;transition:color .3s}
.footer a:hover{color:var(--accent)}
.footer-links{display:flex;gap:1.5rem;flex-wrap:wrap}
.footer-name{font-family:var(--display);font-size:.8rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(249,246,241,.45)}
.cookie-banner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:rgba(17,17,16,.97);backdrop-filter:blur(12px);padding:1.1rem var(--g)}
.cookie-inner{max-width:var(--max-w);margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap}
.cookie-text{font-size:.78rem;font-weight:300;color:rgba(249,246,241,.6);line-height:1.6;flex:1;min-width:260px}
.cookie-text a{color:var(--accent-l)}
.cookie-btn{background:var(--bg);color:var(--dark);border:none;font-family:var(--display);font-size:.68rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:.65rem 1.8rem;cursor:pointer;white-space:nowrap;transition:background .3s}
.cookie-btn:hover{background:var(--accent);color:#fff}
@media(max-width:900px){.artwork-layout{grid-template-columns:1fr}.nav-links{display:none}.hamburger{display:block}}
@media(max-width:600px){.artwork-actions{flex-direction:column}.footer{flex-direction:column;text-align:center}}
</style>
</head>
<body>
<nav class="nav">
  <a href="../index.html" class="nav-logo">Maciej Kędzielski</a>
  <ul class="nav-links">
    <li><a href="../index.html#about">About</a></li>
    <li><a href="../portfolio.html">Portfolio</a></li>
    <li><a href="../index.html#wear">Wear the Work</a></li>
    <li><a href="../index.html#contact">Contact</a></li>
  </ul>
  <a href="../portfolio.html" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
    Portfolio
  </a>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-close" id="mobileClose">&times;</button>
  <a href="../index.html#about" onclick="closeMobile()">About</a>
  <a href="../portfolio.html" onclick="closeMobile()">Portfolio</a>
  <a href="../index.html#wear" onclick="closeMobile()">Wear the Work</a>
  <a href="../index.html#contact" onclick="closeMobile()">Contact</a>
</div>

<div id="artworkContent"><p class="loading-msg">Loading...</p></div>

<footer>
  <div class="footer">
    <span class="footer-name">© 2026 Maciej Kędzielski</span>
    <div class="footer-links">
      <a href="../privacy-policy.html">Privacy</a>
      <a href="../cookie-policy.html">Cookies</a>
      <a href="../index.html#wear">Wear the Work</a>
    </div>
  </div>
</footer>
<div class="cookie-banner" id="cookieBanner">
  <div class="cookie-inner">
    <p class="cookie-text">Essential cookies only. <a href="../cookie-policy.html">Cookie Policy</a></p>
    <button class="cookie-btn" onclick="acceptCookies()">Accept</button>
  </div>
</div>

<script>
var hb=document.getElementById('hamburger'),mm=document.getElementById('mobileMenu'),mc=document.getElementById('mobileClose');
hb.addEventListener('click',function(){hb.classList.toggle('active');mm.classList.toggle('open');document.body.style.overflow=mm.classList.contains('open')?'hidden':'';});
mc.addEventListener('click',closeMobile);
function closeMobile(){hb.classList.remove('active');mm.classList.remove('open');document.body.style.overflow='';}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

var params=new URLSearchParams(window.location.search);
var artworkId=params.get('id');
var allRooms=[];

if(!artworkId){
  document.getElementById('artworkContent').innerHTML='<p class="loading-msg">Artwork not found. <a href="../portfolio.html" style="color:var(--accent)">Back to Portfolio</a></p>';
} else {
  Promise.all([
    fetch('../works.json').then(function(r){return r.json();}),
    fetch('../rooms.json').then(function(r){return r.json();}).catch(function(){return [];})
  ]).then(function(results){
    var works=results[0]; allRooms=results[1];
    var sorted=works.sort(function(a,b){return (a.order||99)-(b.order||99);});
    var work=sorted.find(function(w){return w.id===artworkId;});
    if(!work){document.getElementById('artworkContent').innerHTML='<p class="loading-msg">Not found. <a href="../portfolio.html" style="color:var(--accent)">Back</a></p>';return;}
    if(work.status==='Sold'){document.getElementById('artworkContent').innerHTML='<p class="loading-msg">This work has been sold. <a href="../portfolio.html" style="color:var(--accent)">Browse available works</a></p>';return;}

    document.title=work.title+' — Maciej Kędzielski';
    var d=document.getElementById('metaDesc');if(d)d.setAttribute('content',work.description?work.description.substring(0,160):'');
    var oi=document.getElementById('ogImage');if(oi&&work.image)oi.setAttribute('content',work.image);
    var ot=document.getElementById('ogTitle');if(ot)ot.setAttribute('content',work.title+' — Maciej Kędzielski');

    var badgeClass=work.status==='Available'?'badge-available':work.status==='Sold'?'badge-sold':'badge-inquire';
    var visibleWorks=sorted.filter(function(w){return w.status!=='Sold';});
    var vIdx=visibleWorks.findIndex(function(w){return w.id===artworkId;});
    var prevWork=vIdx>0?visibleWorks[vIdx-1]:null;
    var nextWork=vIdx<visibleWorks.length-1?visibleWorks[vIdx+1]:null;
    var navHtml='<div class="nav-row">';
    if(prevWork)navHtml+='<a href="view.html?id='+encodeURIComponent(prevWork.id)+'" class="btn btn-outline">← Prev</a>';
    if(nextWork)navHtml+='<a href="view.html?id='+encodeURIComponent(nextWork.id)+'" class="btn btn-outline">Next →</a>';
    navHtml+='</div>';

    var inquireMsg='I am interested in: "'+work.title+'" at €'+work.price+'. Please send me more information.';
    var actionsHtml='';
    if(work.status==='Available'&&work.price){
      actionsHtml='<div class="artwork-actions">'
        +'<button class="btn btn-primary" data-price="'+work.price+'" onclick="handleBuy(this)">Buy — €'+work.price+'</button>'
        +'<button class="btn btn-outline" onclick="handleInquire()">Inquire</button>'
        +'</div>';
    } else {
      actionsHtml='<div class="artwork-actions"><button class="btn btn-outline" onclick="handleInquire()">Inquire about this work</button></div>';
    }

    window._inquireMsg=inquireMsg;

    // Room view
    var roomViewHtml='';
    if(allRooms.length>0){
      var defaultRoom=allRooms[0];
      var thumbsHtml=allRooms.map(function(r,i){
        return '<img src="../'+r.image+'" alt="'+r.name+'" class="room-thumb'+(i===0?' active':'')+'" onclick="switchRoom('+i+')">';
      }).join('');
      roomViewHtml='<div class="room-section">'
        +'<p class="section-label" style="margin-bottom:.75rem">View in Room</p>'
        +'<div class="room-scene" id="roomScene">'
        +'<img class="room-bg" id="roomBg" src="../'+defaultRoom.image+'" alt="Room view">'
        +'<div class="room-painting" id="roomPainting" style="left:50%;top:30%;width:1px;aspect-ratio:1;transform:translate(-50%,-50%);opacity:0">'
        +'<div class="room-painting-inner">'
        +'<img src="../'+work.image+'" alt="'+esc(work.title)+' in room" id="roomArtImg" onload="onRoomImgLoaded(this)">'
        +'</div></div></div>'
        +'<div class="room-selector">'+thumbsHtml+'</div>'
        +'<p class="room-caption">Proportionally rendered — '+work.width+' × '+work.height+' cm</p>'
        +'</div>';
    }

    var priceHtml=work.price
      ?'<p class="artwork-price">€'+work.price+'</p>'
      :'<p class="artwork-price" style="font-size:1.4rem">Price on application</p>';

    var html='<div class="artwork-detail">'
      +'<a href="../portfolio.html" class="back-link">← Back to Portfolio</a>'
      +'<div class="artwork-layout">'
      +'<div>'
      +'<img src="../'+work.image+'" alt="'+esc(work.title)+'" class="artwork-main-img" style="aspect-ratio:'+work.width+'/'+work.height+'">'
      +roomViewHtml
      +'</div>'
      +'<div>'
      +'<p class="section-label">'+esc(work.category||'')+'</p>'
      +'<h1 class="artwork-title">'+esc(work.title)+'</h1>'
      +'<p class="artwork-year">'+work.year+'</p>'
      +'<p class="artwork-meta">'+esc(work.medium||'')+'</p>'
      +'<p class="artwork-meta">'+work.width+' × '+work.height+' cm'+(work.year?' · '+work.year:'')+'</p>'
      +priceHtml
      +'<span class="artwork-badge '+badgeClass+'">'+work.status+'</span>'
      +'<p class="artwork-desc">'+esc(work.description||'')+'</p>'
      +actionsHtml
      +'<div class="wear-cta">'
      +'<p>This painting is also available printed on t-shirts, posters, tote bags, and more.</p>'
      +'<a href="../index.html#wear" onclick="sessionStorage.setItem(\'wearWork\',\''+encodeURIComponent(work.title)+'\')">Explore Wear the Work →</a>'
      +'</div>'
      +navHtml
      +'</div>'
      +'</div>'
      +'</div>';

    document.getElementById('artworkContent').innerHTML=html;
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      var l=document.querySelector('.artwork-layout');if(l)l.classList.add('loaded');
    });});
    window._currentWork=work;
  }).catch(function(){document.getElementById('artworkContent').innerHTML='<p class="loading-msg">Error loading artwork. <a href="../portfolio.html" style="color:var(--accent)">Back</a></p>';});
}

function onRoomImgLoaded(img){
  var ratio=img.naturalWidth/img.naturalHeight;
  window._imageRatio=ratio;
  applyRoomPosition(allRooms[0],ratio);
  var p=document.getElementById('roomPainting');if(p)p.style.opacity='1';
}

function applyRoomPosition(room,ratio){
  if(!room)return;
  var work=window._currentWork;
  var paintEl=document.getElementById('roomPainting');
  var customPos=work.room_positions&&work.room_positions[room.id];
  var posX=customPos?customPos.x:room.wall_center_x;
  var posY=customPos?customPos.y:room.wall_center_y;
  var maxPct=room.max_painting_pct||30;
  var scaleFactor=customPos?(customPos.scale/100):1;
  var rotation=(customPos&&customPos.rotation)?customPos.rotation:0;
  var artRatio=ratio||window._imageRatio||1;
  var paintWidthPct=artRatio>=1?maxPct*scaleFactor:maxPct*artRatio/1.6*scaleFactor;
  paintEl.style.left=posX+'%';paintEl.style.top=posY+'%';
  paintEl.style.width=paintWidthPct+'%';paintEl.style.aspectRatio=artRatio;
  paintEl.style.transform='translate(-50%,-50%) rotate('+rotation+'deg)';
}

function switchRoom(idx){
  if(!allRooms[idx]||!window._currentWork)return;
  var room=allRooms[idx];
  document.getElementById('roomBg').src='../'+room.image;
  applyRoomPosition(room,window._imageRatio);
  document.querySelectorAll('.room-thumb').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.room-thumb')[idx].classList.add('active');
}

function handleBuy(btn){
  var title=document.querySelector('.artwork-title')?document.querySelector('.artwork-title').textContent:'this work';
  var price=btn.dataset.price;
  var msg='I would like to purchase: "'+title+'" at €'+price+'. Please send payment details.';
  sessionStorage.setItem('formMsg',msg);sessionStorage.setItem('formSubj','purchase');
  window.location.href='../index.html#contact';
}
function handleInquire(){
  if(window._inquireMsg){sessionStorage.setItem('formMsg',window._inquireMsg);sessionStorage.setItem('formSubj','purchase');}
  window.location.href='../index.html#contact';
}

if(!localStorage.getItem('mk_cookie'))document.getElementById('cookieBanner').style.display='block';
function acceptCookies(){localStorage.setItem('mk_cookie','1');document.getElementById('cookieBanner').style.display='none';}
document.addEventListener('contextmenu',function(e){if(e.target.tagName==='IMG')e.preventDefault();});
document.addEventListener('dragstart',function(e){if(e.target.tagName==='IMG')e.preventDefault();});
document.addEventListener('selectstart',function(e){if(e.target.tagName==='IMG')e.preventDefault();});
</script>
</body>
</html>
